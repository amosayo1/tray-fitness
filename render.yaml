services:
  - type: web
    name: gymsync-api
    runtime: docker
    repo: https://github.com/amosayo1/tray-fitness
    rootDir: backend
    plan: free
    envVars:
      - key: SUPABASE_CONNECTION_STRING
        sync: false
      - key: Jwt__Secret
        sync: false
      - key: Jwt__Issuer
        value: GymSync
      - key: Jwt__Audience
        value: GymSyncMobile
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
